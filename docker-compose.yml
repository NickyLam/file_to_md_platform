services:
  api:
    image: python:3.13-slim
    working_dir: /app
    command: >
      sh -c "pip install -e '.[dev]' &&
      uvicorn backend.app.main:app --host $${APP_HOST:-0.0.0.0} --port $${APP_PORT:-8000}"
    ports:
      - "8000:8000"
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
    volumes:
      - .:/app
